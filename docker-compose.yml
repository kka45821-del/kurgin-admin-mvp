services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cvdlab
      POSTGRES_USER: cvdlab
      POSTGRES_PASSWORD: cvdlab
    ports:
      - "5432:5432"
    volumes:
      - cvdlab_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cvdlab -d cvdlab"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    env_file: .env
    environment:
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn apps.api.app.main:app --host 0.0.0.0 --port 8000 --reload

  admin:
    build:
      context: .
      dockerfile: deploy/Dockerfile.admin
    env_file: .env
    environment:
      PYTHONPATH: /app
    ports:
      - "8502:8502"
    volumes:
      - .:/app
    depends_on:
      - api
    command: streamlit run apps/admin/app.py --server.port 8502 --server.address 0.0.0.0

volumes:
  cvdlab_pg:
