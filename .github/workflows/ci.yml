name: KURGIN Admin CI

on:
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Compile Python files
        run: |
          python -m py_compile app.py
          python -m py_compile admin_menu.py
          python -m py_compile admin_io.py
          python -m py_compile admin_upload.py
          python -m py_compile admin_batches.py
          python -m py_compile admin_validation.py
          python -m py_compile admin_publication_rules.py
          python -m py_compile admin_pricing_rules.py
          python -m py_compile admin_pricing.py
          python -m py_compile admin_publish.py
          python -m py_compile admin_product_management/*.py

      - name: Run pricing smoke checks
        run: |
          python scripts/smoke_pricing_rules.py

      - name: Run catalog export dry-run
        run: |
          python scripts/dry_run_catalog_export.py

      - name: Run pytest
        env:
          PYTHONPATH: .
        run: |
          pytest tests/test_admin_pricing_rules.py
