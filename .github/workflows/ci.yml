name: KURGIN Admin CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Compile all Python files
        run: |
          python -m compileall .

      - name: Run pricing smoke checks
        run: |
          python scripts/smoke_pricing_rules.py

      - name: Run catalog export dry-run
        run: |
          python scripts/dry_run_catalog_export.py

      - name: Run pytest
        env:
          PYTHONPATH: .
        run: |
          pytest tests/test_admin_pricing_rules.py tests/test_publication_rules.py tests/test_admin_integrity.py tests/test_admin_section_policy.py
